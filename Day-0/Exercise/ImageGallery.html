<!DOCTYPE html>
<html lang="en">
<head>
    <title>Image Gallery</title>
</head>

<body>
    <h2>Welcome to the collection of my Images  in gallery >></h2>
<marquee behaviour="alternate" direction="right" scrollamount="3">
    <img src="img1.png" height="200px" width="300px" alt="an image to the image gallery">
</marquee>    
<marquee behaviour="alternate" direction="down" scrollamount="3">
    <img src="img2.jpeg" height="200px" width="300px" alt="an image to the image gallery">
</marquee>
<marquee behaviour="alternate" direction="left" scrollamount="3">
    <img src="img3.jpg" height="200px" width="300px" alt="an image to the image gallery">
</marquee>
<marquee behaviour="alternate" direction="up" scrollamount="3">
    <img src="img4.jpg" height="200px" width="300px" alt="an image to the image gallery">
</marquee>
</body>
</html>
