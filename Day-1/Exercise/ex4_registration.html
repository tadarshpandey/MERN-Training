<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Registration System</title>
</head>
<body>
    <h1>Online Registration Form</h1>
    <p>Please fill out this form to register for the upcoming class.</p>
    <hr>
    
    <form action="#" method="POST">
        <p>
            <label for="first-name">First Name:</label><br>
            <input type="text" id="first-name" name="first-name" required placeholder="Enter first name">
        </p>
        
        <p>
            <label for="last-name">Last Name:</label><br>
            <input type="text" id="last-name" name="last-name" required placeholder="Enter last name">
        </p>
        
        <p>
            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" required placeholder="name@example.com">
        </p>
        
        <p>
            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password" required placeholder="Create a password">
        </p>
        
        <p>
            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="dob" required>
        </p>
        
        <p>
            <label>Gender:</label><br>
            <input type="radio" id="gender-male" name="gender" value="male">
            <label for="gender-male">Male</label>
            <input type="radio" id="gender-female" name="gender" value="female">
            <label for="gender-female">Female</label>
            <input type="radio" id="gender-other" name="gender" value="other">
            <label for="gender-other">Other</label>
        </p>
        
        <p>
            <label for="course">Select Course Track:</label><br>
            <select id="course" name="course">
                <option value="html">HTML5 Basics</option>
                <option value="mern">MERN Full Stack Development</option>
                <option value="dsa">Data Structures and Algorithms</option>
            </select>
        </p>
        
        <p>
            <label for="bio">Short Biography:</label><br>
            <textarea id="bio" name="bio" rows="4" cols="50" placeholder="Tell us about your coding background..."></textarea>
        </p>
        
        <p>
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">I agree to the Terms of Service and Privacy Policy.</label>
        </p>
        
        <p>
            <input type="submit" value="Register Now">
            <input type="reset" value="Reset Form">
        </p>
    </form>
</body>
</html>
