<!DOCTYPE html>
<html>
<head>
    <title>Product Card</title>
    <style>
        .card{
            margin:3px;
            width:250px;
            border:1px solid black;
            padding:15px;
            position:relative;
            text-align:center;
        }

        .badge{
            position:absolute;
            top:10px;
            right:10px;
            background:red;
            color:white;
            padding:5px 10px;
            font-weight:bold;
        }

        .product-img{
            width:200px;
            height:200px;
            border:1px solid gray;
        }

        .price{
            font-size:20px;
            font-weight:bold;
            color:green;
        }

        button{
            padding:10px 20px;
            margin-top:10px;
            cursor:pointer;
        }
        .container{
    display:flex;
    gap:20px;
}
    </style>
</head>
<body>

    <div class="card">

        <div class="badge">20% OFF</div>

        <img src="logo.png"
             alt="Product"
             class="product-img">

        <h3>Wireless Headphones</h3>

        <p class="price">₹1,999</p>

        <button>Add to Cart</button>
    </div>

  
</body>
</html>
