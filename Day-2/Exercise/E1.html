<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body{
            background-color:rgba(214, 137, 137, 0.782);
        }
        form{
            align-items: center;
            background-color: linen;
            width: 60%;
            justify-self: center;
            
        }
        p{
            text-align: center;
            font-size: 20px;

        }
        table{
            border: solid;
            width: 100%;
            border-radius: 5px;
        }
        .copyright{
            font-size: 12px;
        }
        input{
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <p><strong>Login Form</strong></p>
    <hr>
    <form action="#" method="post">
        <table>
            <tr>
                <td>

                    <label>Email :</label>

                </td>
                <td>
                    <input type="email" required>
                </td>
            </tr>
            <tr>
                <td>Password :</td>
                <td>
                    <input type="password" required>
                </td>
            </tr>

            <tr>
                <td>Remember Me :</td>
                <td>
                    <input type="checkbox"> 
                </td>
            </tr>
            <tr>
                <td>

                </td>

                <td>
                    <input type="submit">
                </td>
            </tr>
        </table>
    </form>    

    <hr>

    <p class="copyright" align="center"> &copy; all right reserved</p>
</body>
</html>
