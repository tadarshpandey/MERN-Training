<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Panel</title>

    <style>
        .nav-bar{
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 50%;
            margin: 5px;
        }
        .notification-panel{
            display: flex;
            justify-content: end;
            justify-self: end;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div>
        <h2>User Dashboard</h2>
    </div>

   
    </div>
    <div class="notificatio-panel">
     <!-- Using the HTML <details> tag creates a native dropdown without needing CSS or JavaScript -->
    <details style="width: 150px; border: 1px solid #ccc; padding: 10px; font-family: sans-serif;">
        <!-- <summary> is the visible heading that you click to toggle the dropdown -->
        <summary style="cursor: pointer; font-size: 15px; font-weight: bold;">
            Notifications (3)
        </summary>
        
        <hr style="margin: 10px 0;">
        
        <!-- The list of notifications -->
        <ul style="list-style-type: square; padding-left: 20px; margin: 0;">
            <li style="margin-bottom: 8px;">Someone liked your post.</li>
            <li style="margin-bottom: 8px;">You have a new friend request.</li>
            <li style="margin-bottom: 8px;">System maintenance scheduled for tonight.</li>
        </ul>
    </details>
   </div>

</body>
</html>
