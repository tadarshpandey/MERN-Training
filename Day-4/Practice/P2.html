<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 300px;
        }

        h2{
            text-align: center;
        }

        input{
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
        }

        button{
            width: 100%;
            padding: 10px;
            background: #ff4545;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover{
            background: #b30000;
        }
    </style>

    <script>
        function maxOfFive(){

            let num1 = parseInt(document.getElementById("a").value);
            let num2 = parseInt(document.getElementById("b").value);
            let num3 = parseInt(document.getElementById("c").value);
            let num4 = parseInt(document.getElementById("d").value);
            let num5 = parseInt(document.getElementById("e").value);

    // Check for empty inputs
        if(
            isNaN(num1) ||
            isNaN(num2) ||
            isNaN(num3) ||
            isNaN(num4) ||
            isNaN(num5)
        ){
            alert("Please enter all five numbers");
            return;
        }

        let max = 0;

        if((num1 >= num2) && (num1 >= num3) && (num1 >= num4) && (num1 >= num5)){
            max = num1;
        }
        else if((num2 >= num1) && (num2 >= num3) && (num2 >= num4) && (num2 >= num5)){
            max = num2;
        }
        else if((num3 >= num1) && (num3 >= num2) && (num3 >= num4) && (num3 >= num5)){
            max = num3;
        }
        else if((num4 >= num1) && (num4 >= num2) && (num4 >= num3) && (num4 >= num5)){
            max = num4;
        }
        else{
            max = num5;
        }

        document.getElementById("result").value = max;
    }
    </script>
</head>
<body>
    <div class="container">
        <h2>Find Maximum Number</h2>

        <input type="number" id="a" placeholder="Enter Number 1">
        <input type="number" id="b" placeholder="Enter Number 2">
        <input type="number" id="c" placeholder="Enter Number 3">
        <input type="number" id="d" placeholder="Enter Number 4">
        <input type="number" id="e" placeholder="Enter Number 5">

        <button type="button" onclick="maxOfFive()">
            Find Maximum
        </button>

        <input type="text" id="result" placeholder="Maximum Number" readonly>
    </div>

    
</body>
</html>
